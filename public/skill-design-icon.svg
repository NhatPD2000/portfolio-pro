<svg width="200" height="180" viewBox="0 0 200 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Design: Pen/Brush themed -->
  <defs>
    <linearGradient id="design-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C084FC;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:0.1" />
    </linearGradient>
  </defs>

  <!-- Background glow -->
  <circle cx="100" cy="100" r="80" fill="url(#design-fill)" opacity="0.5"/>

  <!-- Pen tool -->
  <g opacity="0.7">
    <path d="M80 60 L90 50 L110 70 L100 80 Z" fill="none" stroke="#C084FC" strokeWidth="1.5"/>
    <line x1="100" y1="80" x2="70" y2="110" stroke="#C084FC" strokeWidth="1.5"/>
    <circle cx="70" cy="110" r="3" fill="#C084FC" opacity="0.8"/>
  </g>

  <!-- Bezier curve -->
  <g opacity="0.6">
    <path d="M60 120 Q100 90 140 120" stroke="#C084FC" strokeWidth="1.5" fill="none" strokeDasharray="3 3"/>
    <circle cx="60" cy="120" r="2.5" fill="#C084FC"/>
    <circle cx="100" cy="90" r="2.5" fill="#C084FC"/>
    <circle cx="140" cy="120" r="2.5" fill="#C084FC"/>
  </g>

  <!-- Color palette -->
  <g opacity="0.7">
    <circle cx="120" cy="140" r="6" fill="none" stroke="#C084FC" strokeWidth="1"/>
    <circle cx="135" cy="140" r="6" fill="none" stroke="#C084FC" strokeWidth="1"/>
    <circle cx="150" cy="140" r="6" fill="none" stroke="#C084FC" strokeWidth="1"/>
  </g>

  <!-- Grid -->
  <g opacity="0.3">
    <line x1="50" y1="50" x2="50" y2="150" stroke="#C084FC" strokeWidth="0.5"/>
    <line x1="150" y1="50" x2="150" y2="150" stroke="#C084FC" strokeWidth="0.5"/>
    <line x1="50" y1="50" x2="150" y2="50" stroke="#C084FC" strokeWidth="0.5"/>
    <line x1="50" y1="150" x2="150" y2="150" stroke="#C084FC" strokeWidth="0.5"/>
  </g>

  <!-- Floating dots -->
  <circle cx="45" cy="140" r="2" fill="#C084FC" opacity="0.5"/>
  <circle cx="155" cy="60" r="1.5" fill="#C084FC" opacity="0.4"/>
  <circle cx="165" cy="130" r="1" fill="#C084FC" opacity="0.3"/>
</svg>
