<svg width="280" height="200" viewBox="0 0 280 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Isometric tablet with documents -->
  <defs>
    <linearGradient id="ba-grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="ba-grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0.5" />
    </linearGradient>
    <filter id="ba-glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base platform -->
  <path d="M60 140 L140 100 L220 140 L140 180 Z" fill="#1E1B4B" opacity="0.3"/>

  <!-- Floating cubes -->
  <g opacity="0.6">
    <path d="M50 80 L70 70 L70 90 L50 100 Z" fill="url(#ba-grad1)"/>
    <path d="M70 70 L90 80 L90 100 L70 90 Z" fill="url(#ba-grad2)"/>
    <path d="M50 80 L70 70 L90 80 L70 90 Z" fill="#6366F1" opacity="0.8"/>
  </g>

  <g opacity="0.5">
    <path d="M190 70 L210 60 L210 80 L190 90 Z" fill="url(#ba-grad1)"/>
    <path d="M210 60 L230 70 L230 90 L210 80 Z" fill="url(#ba-grad2)"/>
    <path d="M190 70 L210 60 L230 70 L210 80 Z" fill="#6366F1" opacity="0.7"/>
  </g>

  <!-- Main tablet -->
  <g filter="url(#ba-glow)">
    <!-- Tablet body -->
    <path d="M80 100 L140 70 L200 100 L140 130 Z" fill="url(#ba-grad1)" opacity="0.9"/>
    <path d="M80 100 L80 140 L140 170 L140 130 Z" fill="url(#ba-grad2)" opacity="0.8"/>
    <path d="M140 130 L200 100 L200 140 L140 170 Z" fill="#3B82F6" opacity="0.7"/>

    <!-- Screen content lines -->
    <line x1="95" y1="110" x2="125" y2="95" stroke="#A5B4FC" strokeWidth="2" opacity="0.8"/>
    <line x1="95" y1="118" x2="120" y2="105" stroke="#A5B4FC" strokeWidth="2" opacity="0.6"/>
    <line x1="95" y1="126" x2="115" y2="115" stroke="#A5B4FC" strokeWidth="2" opacity="0.5"/>

    <!-- Icons on screen -->
    <circle cx="100" cy="140" r="3" fill="#818CF8" opacity="0.9"/>
    <circle cx="110" cy="135" r="3" fill="#818CF8" opacity="0.9"/>
    <circle cx="120" cy="130" r="3" fill="#818CF8" opacity="0.9"/>

    <!-- Glow accent -->
    <ellipse cx="140" cy="100" rx="60" ry="15" fill="#6366F1" opacity="0.2"/>
  </g>

  <!-- Floating particles -->
  <circle cx="40" cy="60" r="2" fill="#818CF8" opacity="0.6"/>
  <circle cx="240" cy="90" r="2" fill="#818CF8" opacity="0.5"/>
  <circle cx="70" cy="50" r="1.5" fill="#A5B4FC" opacity="0.7"/>
  <circle cx="210" cy="50" r="1.5" fill="#A5B4FC" opacity="0.6"/>
</svg>
