<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- PNJ Logo - Jewelry brand with gem -->
  <defs>
    <linearGradient id="gemGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Gem shape -->
  <polygon points="100,30 140,80 130,150 70,150 60,80" fill="url(#gemGradient)" stroke="#D4AF37" stroke-width="2"/>
  <!-- Text -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">PNJ</text>
</svg>