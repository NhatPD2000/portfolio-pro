<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <!-- Connection lines: input → hidden -->
  <line x1="38" y1="40"  x2="90" y2="28"  stroke="white" stroke-width="0.9" stroke-opacity="0.22"/>
  <line x1="38" y1="40"  x2="90" y2="68"  stroke="white" stroke-width="0.9" stroke-opacity="0.28"/>
  <line x1="38" y1="40"  x2="90" y2="108" stroke="white" stroke-width="0.9" stroke-opacity="0.14"/>
  <line x1="38" y1="80"  x2="90" y2="28"  stroke="white" stroke-width="0.9" stroke-opacity="0.18"/>
  <line x1="38" y1="80"  x2="90" y2="68"  stroke="white" stroke-width="0.9" stroke-opacity="0.32"/>
  <line x1="38" y1="80"  x2="90" y2="108" stroke="white" stroke-width="0.9" stroke-opacity="0.28"/>
  <line x1="38" y1="80"  x2="90" y2="138" stroke="white" stroke-width="0.9" stroke-opacity="0.16"/>
  <line x1="38" y1="120" x2="90" y2="68"  stroke="white" stroke-width="0.9" stroke-opacity="0.14"/>
  <line x1="38" y1="120" x2="90" y2="108" stroke="white" stroke-width="0.9" stroke-opacity="0.3"/>
  <line x1="38" y1="120" x2="90" y2="138" stroke="white" stroke-width="0.9" stroke-opacity="0.26"/>

  <!-- Connection lines: hidden → output -->
  <line x1="108" y1="28"  x2="160" y2="55"  stroke="white" stroke-width="0.9" stroke-opacity="0.28"/>
  <line x1="108" y1="68"  x2="160" y2="55"  stroke="white" stroke-width="0.9" stroke-opacity="0.34"/>
  <line x1="108" y1="68"  x2="160" y2="105" stroke="white" stroke-width="0.9" stroke-opacity="0.22"/>
  <line x1="108" y1="108" x2="160" y2="55"  stroke="white" stroke-width="0.9" stroke-opacity="0.18"/>
  <line x1="108" y1="108" x2="160" y2="105" stroke="white" stroke-width="0.9" stroke-opacity="0.34"/>
  <line x1="108" y1="138" x2="160" y2="105" stroke="white" stroke-width="0.9" stroke-opacity="0.26"/>

  <!-- Input layer nodes -->
  <circle cx="30" cy="40"  r="7.5" stroke="white" stroke-width="1.4" stroke-opacity="0.55"/>
  <circle cx="30" cy="80"  r="7.5" stroke="white" stroke-width="1.4" stroke-opacity="0.75"/>
  <circle cx="30" cy="120" r="7.5" stroke="white" stroke-width="1.4" stroke-opacity="0.55"/>
  <circle cx="30" cy="80"  r="3"   fill="white"   fill-opacity="0.45"/>

  <!-- Hidden layer nodes -->
  <circle cx="99" cy="28"  r="8"   stroke="white" stroke-width="1.4" stroke-opacity="0.6"/>
  <circle cx="99" cy="68"  r="8"   stroke="white" stroke-width="1.8" stroke-opacity="0.9"/>
  <circle cx="99" cy="108" r="8"   stroke="white" stroke-width="1.4" stroke-opacity="0.7"/>
  <circle cx="99" cy="138" r="6.5" stroke="white" stroke-width="1.2" stroke-opacity="0.5"/>
  <circle cx="99" cy="68"  r="3.5" fill="white"   fill-opacity="0.55"/>

  <!-- Output layer nodes -->
  <circle cx="168" cy="55"  r="9.5" stroke="white" stroke-width="1.8" stroke-opacity="0.9"/>
  <circle cx="168" cy="105" r="9.5" stroke="white" stroke-width="1.4" stroke-opacity="0.65"/>
  <circle cx="168" cy="55"  r="4"   fill="white"   fill-opacity="0.5"/>

  <!-- Pulse rings on active output -->
  <circle cx="168" cy="55" r="15" stroke="white" stroke-width="0.7" stroke-opacity="0.18"/>
  <circle cx="168" cy="55" r="21" stroke="white" stroke-width="0.5" stroke-opacity="0.1"/>

  <!-- Floating data particles -->
  <circle cx="62"  cy="18"  r="1.8" fill="white" fill-opacity="0.35"/>
  <circle cx="132" cy="148" r="1.5" fill="white" fill-opacity="0.28"/>
  <circle cx="78"  cy="152" r="1.2" fill="white" fill-opacity="0.32"/>
  <circle cx="150" cy="22"  r="1.2" fill="white" fill-opacity="0.28"/>
  <circle cx="14"  cy="55"  r="1"   fill="white" fill-opacity="0.25"/>
  <circle cx="185" cy="80"  r="1.5" fill="white" fill-opacity="0.3"/>
</svg>
