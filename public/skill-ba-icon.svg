<svg width="200" height="180" viewBox="0 0 200 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- BA: Document/Clipboard themed -->
  <defs>
    <linearGradient id="ba-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0.1" />
    </linearGradient>
  </defs>

  <!-- Background glow -->
  <circle cx="100" cy="100" r="80" fill="url(#ba-fill)" opacity="0.5"/>

  <!-- Document stack -->
  <g opacity="0.6">
    <rect x="60" y="50" width="80" height="100" rx="4" fill="none" stroke="#818CF8" strokeWidth="1.5"/>
    <line x1="70" y1="65" x2="130" y2="65" stroke="#818CF8" strokeWidth="1" opacity="0.7"/>
    <line x1="70" y1="80" x2="130" y2="80" stroke="#818CF8" strokeWidth="1" opacity="0.6"/>
    <line x1="70" y1="95" x2="120" y2="95" stroke="#818CF8" strokeWidth="1" opacity="0.5"/>
    <line x1="70" y1="110" x2="130" y2="110" stroke="#818CF8" strokeWidth="1" opacity="0.6"/>
    <line x1="70" y1="125" x2="115" y2="125" stroke="#818CF8" strokeWidth="1" opacity="0.5"/>
  </g>

  <!-- Checkmark -->
  <g opacity="0.7">
    <circle cx="145" cy="65" r="12" fill="none" stroke="#818CF8" strokeWidth="1.5"/>
    <path d="M142 68 L145 71 L150 63" stroke="#818CF8" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
  </g>

  <!-- Floating dots -->
  <circle cx="50" cy="140" r="2" fill="#818CF8" opacity="0.5"/>
  <circle cx="150" cy="150" r="1.5" fill="#818CF8" opacity="0.4"/>
  <circle cx="70" cy="160" r="1" fill="#818CF8" opacity="0.3"/>
</svg>
